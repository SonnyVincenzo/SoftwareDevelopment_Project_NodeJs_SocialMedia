<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="stylesheet" href="/public/css/profilePage.css">
</head>

<body>
    <nav>
        <a href="#">Home</a>
        <span>|</span>
        <a href="#">Profile</a>
    </nav>

    <div class="mainContainer">
        
        <div class="profile-column">
            <div class="profileName">
                <h1>Full Name</h1>
                <h5>@Username</h5>

                <div class="profileDescription">
                    <p>Description bla bla bla</p>
                    <button class="standardButton">Edit Profile</button>
                </div>

                <div class="profileButtons">
                    <button class="standardButton">Follow</button>
                    <span>|</span>
                    <button class="standardButton">Message</button>
                </div>
            </div>
        </div>

        <div class="posts-column">
            <div class="post">
                <h2>Posts</h2>
                <button class="standardButton">New Post</button>
            </div>
            <div class="posts">
                <p>Post 1</p>
                <p>Post 2</p>
            </div>
        </div>

    </div> 


</body>
</html>
