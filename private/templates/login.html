<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/public/css/login.css">
</head>

<!-- Elements displayed on the website should never be outside <body> -LJ -->
<nav>
    <a href="#">Home</a>
    <span>|</span>
    <a href="#">Login</a><br><br>
</nav>

<body>
    <div id="loginBox">
        <h1>Login or Register</h1>
        <form action="/auth/login" method="post" autocomplete="on">
            <div>
                <label for="user-field">Username:</label><br>
                <input type="text" id="user-field" name="username" required><br><br>

                <label for="pass-field">Password:</label><br>
                <input type="password" id="pass-field" name="password" required><br><br>

                <button>Submit</button>
                <span>|</span>
                <button>Create User</button>
            </div>
        </form>
    </div>
</body>

<footer>
    <h6 style="color: white;">Zaid-Yassir Sultan är bäst</h6>
</footer>
</html>
