name: AutoRelease

on: 
  push:
    tags: 
    - 'v*'
permissions: 
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: checkout repository
      uses: actions/checkout@v4

    - name: Extract version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
    - name: Validate version matches package.json
      run: |
        PKG_VERSION=$(node -p "require('./package.json').version")
        if["$PKG_VERSION" != $VERSION]; then
        echo "Version mismatch: tag=$VERSION package.json=$PKG_VERSION"
        exit 1
        fi  
    - name: Install dependencies
      run: npm installation

    - name: build project 
      run: npm run build 
    - name: write version files
      run: echo $VERSION > VERSION.txt

    - name: Create zip archive
      run: zip -r repo-archive-$VERSION.zip . -x '*.git*'


    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: repo-archive-$VERSION.zip
        name: Release ${{ env.VERSION }}
        tag_name: ${{github.ref_name}}
        body: 
          https://github.com/SonnyVincenzo/SoftwareDevelopment_Project_NodeJs_SocialMedia
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    

