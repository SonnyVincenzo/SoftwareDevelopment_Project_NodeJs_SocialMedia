version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: your_database
      MYSQL_USER: appuser
      MYSQL_PASSWORD: appuser_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  node:
    build: .
    container_name: node-app
    environment:
      NODE_ENV: production
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: appuser
      MYSQL_PASSWORD: appuser_password
      MYSQL_DATABASE: your_database
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    working_dir: /app

volumes:
  mysql-data:
